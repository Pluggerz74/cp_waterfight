prefix: "&b&lWater Fight &r&7» &r"

general:
  no-permission: "&cYou do not have permission to do that."
  reload-success: "&aConfiguration reloaded successfully."
  reload-failure: "&cFailed to reload configuration. Check the console."
  unknown-command: "&cUnknown command. Use &f/wf help &cfor help."
