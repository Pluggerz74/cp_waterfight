    &7Java: &f%java%

help:
  header: "&b&lWater Fight &r&7— Commands"
  player: |
    &7  &f/wf help &8— &7Show commands
    &7  &f/wf version &8— &7Plugin version info
    &7  &f/wf join <arena> &8— &7Join a Water Fight arena
    &7  &f/wf leave &8— &7Leave your current arena
  reload-line: "&7  &f/wf reload &8— &7Reload plugin configuration"
  admin: |
    &7  &f/wf help &8— &7Show this help page
    &7  &f/wf join <arena> &8— &7Join an arena
    &7  &f/wf leave &8— &7Leave your current arena
    &7  &f/wf reload &8— &7Reload plugin configuration
    &7  &f/wf create <arena> &8— &7Create a new arena
    &7  &f/wf delete <arena> &8— &7Delete an arena
    &7  &f/wf setlobby <arena> &8— &7Set arena lobby to your location
    &7  &f/wf setjoin <arena> &8— &7Set join block to targeted block
    &7  &f/wf addspawn <arena> &8— &7Add a spawn point to your location
    &7  &f/wf info <arena> &8— &7Show arena details
    &7  &f/wf list &8— &7List all arenas
    &7  &f/wf forcestart <arena> &8— &7Force-start a match
    &7  &f/wf stop <arena> &8— &7Stop countdown or match
    &7  &f/wf tp <arena> &8— &7Teleport to arena lobby
    &7  &f/wf setmin <arena> <amount> &8— &7Set minimum players
    &7  &f/wf setmax <arena> <amount> &8— &7Set maximum players
    &7  &f/wf rename <arena> <name> &8— &7Set display name
    &7  &f/wf validate <arena> &8— &7Check arena setup
  footer: "&8Use /wf help for this list."

