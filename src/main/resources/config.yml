# cp_waterfight — main configuration
# Game mode display name (do not change unless rebranding)
game-mode-name: "Water Fight"

# Minimum players required to start a match
min-players: 2

# Maximum players per arena
max-players: 16

# Countdown duration in seconds before a match starts (legacy fallback)
countdown-seconds: 10

# Game flow settings
game:
  countdown-seconds: 10
  ending-seconds: 5
  prevent-fall-damage-before-start: true
  clear-inventory-on-stop: true
  clear-inventory-on-leave: true
  hide-death-messages: true
  broadcast-level-up: true

# Brief spectator phase after in-game deaths before respawn and re-equip
spectator:
  enabled: true
  duration-ticks: 40
  gamemode: "SPECTATOR"
  hide-from-players: false
  teleport-to-killer: false
  send-title: true

# Arena protections while players are joined
protection:
  message-cooldown-millis: 1500
  block-item-drop: true
  block-item-pickup: true
  block-inventory-click: true
  block-offhand-swap: true
  block-break: true
  block-place: true
  lock-food-level: true
  prevent-fire-damage-before-start: true
  prevent-drowning-before-start: true
  prevent-item-durability-loss: true
  restrict-commands-ingame: true
  allowed-commands-ingame:
    - "wf"
    - "waterfight"
    - "msg"
    - "tell"
    - "r"

# Whether to broadcast match events to the server
broadcast-events: true

# Debug logging (disable in production)
debug: false

# User-facing labels for arena game states (join display %state%)
state-labels:
  WAITING: "Wartet"
  COUNTDOWN: "Startet"
  INGAME: "Im Spiel"
  ENDING: "Beendet"

# Sidebar scoreboard while players are in an arena
scoreboard:
  enabled: true
  update-interval-ticks: 20
  title: "&b&lWater Fight"
  lines:
    - "&7Map: &e%map%"
    - ""
    - "&7Dein Platz: &a#%rank%"
    - "&7Level: &f%level% &8/ &f%max_level%"
    - "&7Waffe: &e%weapon%"
    - "&7Kills: &a%kills% &8/ &a%kills_required%"
    - ""
    - "&7Top:"
    - "&61. %top_1_name% &8- &fLv. %top_1_level%"
    - "&72. %top_2_name% &8- &fLv. %top_2_level%"
    - "&c3. %top_3_name% &8- &fLv. %top_3_level%"

# TextDisplay above join blocks
join-display:
  enabled: true
  height-offset: 1.8
  lines:
    - "&b&lWater Fight"
    - "&7Spieler: &a%players% &7/ &a%max_players%"
    - "&7Map: &e%map%"
    - "&7Status: &f%state%"
