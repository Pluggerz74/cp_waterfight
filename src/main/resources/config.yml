# cp_waterfight — main configuration
# Game mode display name (do not change unless rebranding)
game-mode-name: "Water Fight"

# Minimum players required to start a match
min-players: 2

# Maximum players per arena
max-players: 16

# Countdown duration in seconds before a match starts (legacy fallback)
countdown-seconds: 10

# Game flow settings
game:
  countdown-seconds: 10
  ending-seconds: 5
  prevent-fall-damage-before-start: true
  clear-inventory-on-stop: true
  hide-death-messages: true
  broadcast-level-up: true

# Whether to broadcast match events to the server
broadcast-events: true

# Debug logging (disable in production)
debug: false

# User-facing labels for arena game states (join display %state%)
state-labels:
  WAITING: "Wartet"
  COUNTDOWN: "Startet"
  INGAME: "Im Spiel"
  ENDING: "Beendet"

# Sidebar scoreboard while players are in an arena
scoreboard:
  enabled: true
  update-interval-ticks: 20
  title: "&b&lWater Fight"
  lines:
    - "&7Map: &e%map%"
    - ""
    - "&7Dein Platz: &a#%rank%"
    - "&7Level: &f%level% &8/ &f%max_level%"
    - "&7Waffe: &e%weapon%"
    - "&7Kills: &a%kills% &8/ &a%kills_required%"
    - ""
    - "&7Top:"
    - "&61. %top_1_name% &8- &fLv. %top_1_level%"
    - "&72. %top_2_name% &8- &fLv. %top_2_level%"
    - "&c3. %top_3_name% &8- &fLv. %top_3_level%"

# TextDisplay above join blocks
join-display:
  enabled: true
  height-offset: 1.8
  lines:
    - "&b&lWater Fight"
    - "&7Spieler: &a%players% &7/ &a%max_players%"
    - "&7Map: &e%map%"
    - "&7Status: &f%state%"
