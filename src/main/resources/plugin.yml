name: cp_waterfight
version: '${project.version}'
main: de.codingplugs.cpwaterfight.CPWaterFight
api-version: '1.21'
description: Water Fight minigame for Paper 1.21.x
authors:
  - CodingPlugs

commands:
  waterfight:
    description: Water Fight minigame commands
    aliases:
      - wf
    usage: /<command> help
    permission: cpwaterfight.use

permissions:
  cpwaterfight.use:
    description: Access /wf help and /wf version
    default: true
  cpwaterfight.join:
    description: Join and leave Water Fight arenas
    default: true
  cpwaterfight.admin:
    description: Arena setup, reload, and match administration
    default: op
