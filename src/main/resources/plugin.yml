name: cp_waterfight
version: '${project.version}'
main: de.codingplugs.cpwaterfight.CPWaterFight
api-version: '1.21'
description: Premium Water Fight minigame for Paper 1.21.x (Java 21)
authors:
  - CodingPlugs

# Root command: /waterfight and alias /wf (subcommands handled in-plugin)
commands:
  waterfight:
    description: Water Fight minigame — use /wf help
    aliases:
      - wf
    usage: /<command> help
    permission: cpwaterfight.use

permissions:
  cpwaterfight.use:
    description: Use /wf help, version, and base command access
    default: true
  cpwaterfight.join:
    description: Join and leave Water Fight arenas (/wf join, /wf leave, join blocks)
    default: true
  cpwaterfight.admin:
    description: Arena setup, reload, forcestart, stop, validate, debug, and other admin subcommands
    default: op
